<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>教学对话助手 - 慧备灵师</title>
<style>
:root { --primary: #8B0000; --primary-light: #a52a2a; --gold: #FFD700; --bg: #f5f5f0; --sidebar-bg: #1a1a2e; --msg-user: #e8f4f8; --msg-bot: #ffffff; --border: #e2e8f0; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; height: 100vh; display: flex; background: var(--bg); }

/* 侧边栏 */
.sidebar { width: 280px; background: var(--sidebar-bg); color: #fff; display: flex; flex-direction: column; flex-shrink: 0; }
.sidebar-header { padding: 1.2rem; border-bottom: 1px solid rgba(255,255,255,0.1); }
.sidebar-header a { color: #a0aec0; text-decoration: none; font-size: 0.85rem; }
.sidebar-header a:hover { color: #FFD700; }
.sidebar-header h2 { font-size: 1.1rem; margin-top: 0.5rem; }
.new-chat-btn { margin: 0.8rem; padding: 0.7rem; background: var(--primary); border: none; color: #fff; border-radius: 8px; cursor: pointer; font-size: 0.95rem; transition: background 0.2s; }
.new-chat-btn:hover { background: var(--primary-light); }
.session-list { flex: 1; overflow-y: auto; padding: 0.5rem; }
.session-item { padding: 0.6rem 0.8rem; border-radius: 6px; cursor: pointer; margin-bottom: 2px; font-size: 0.9rem; color: #cbd5e0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: background 0.2s; }
.session-item:hover, .session-item.active { background: rgba(255,255,255,0.1); color: #fff; }
.mode-select { margin: 0.5rem 0.8rem 0.8rem; }
.mode-select label { display: block; font-size: 0.8rem; color: #a0aec0; margin-bottom: 0.3rem; }
.mode-select select { width: 100%; padding: 0.4rem; border-radius: 4px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: #fff; font-size: 0.85rem; }

/* 主区域 */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.chat-header { padding: 0.8rem 1.5rem; background: #fff; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.8rem; }
.chat-header h3 { font-size: 1rem; color: #333; }
.status-bar { font-size: 0.8rem; color: #999; margin-left: auto; }

/* 消息区 */
.messages { flex: 1; overflow-y: auto; padding: 1.5rem; }
.message { display: flex; gap: 0.8rem; margin-bottom: 1.2rem; max-width: 80%; }
.message.user { flex-direction: row-reverse; margin-left: auto; }
.avatar { width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1rem; flex-shrink: 0; }
.message.user .avatar { background: var(--primary); color: #fff; }
.message.bot .avatar { background: var(--gold); color: #333; }
.bubble { padding: 0.8rem 1rem; border-radius: 12px; line-height: 1.7; font-size: 0.95rem; word-break: break-word; }
.message.user .bubble { background: var(--primary); color: #fff; border-top-right-radius: 4px; }
.message.bot .bubble { background: var(--msg-bot); color: #333; border: 1px solid var(--border); border-top-left-radius: 4px; }
.message.bot .bubble pre { background: #f7f7f7; padding: 0.8rem; border-radius: 6px; overflow-x: auto; margin: 0.5rem 0; font-size: 0.85rem; }
.message.bot .bubble code { font-family: "Fira Code", monospace; }

/* 工具调用卡片 */
.tool-card { background: #fefce8; border: 1px solid #fde68a; border-radius: 8px; padding: 0.6rem 0.8rem; margin: 0.5rem 0; font-size: 0.85rem; }
.tool-card .tool-name { color: var(--primary); font-weight: 600; }
.tool-card .tool-result { color: #666; margin-top: 0.3rem; max-height: 120px; overflow-y: auto; font-size: 0.8rem; }

/* 输入区 */
.input-area { padding: 1rem 1.5rem; background: #fff; border-top: 1px solid var(--border); }
.input-wrap { display: flex; gap: 0.6rem; max-width: 800px; margin: 0 auto; }
.input-wrap textarea { flex: 1; padding: 0.7rem 1rem; border: 1px solid var(--border); border-radius: 8px; font-size: 0.95rem; resize: none; height: 44px; max-height: 120px; font-family: inherit; line-height: 1.5; }
.input-wrap textarea:focus { outline: none; border-color: var(--primary); }
.send-btn { padding: 0 1.2rem; background: var(--primary); color: #fff; border: none; border-radius: 8px; cursor: pointer; font-size: 0.95rem; transition: background 0.2s; white-space: nowrap; }
.send-btn:hover { background: var(--primary-light); }
.send-btn:disabled { background: #ccc; cursor: not-allowed; }

/* 欢迎页 */
.welcome { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; color: #999; }
.welcome h2 { font-size: 1.5rem; color: #666; margin-bottom: 0.5rem; }
.welcome p { font-size: 0.95rem; margin-bottom: 1.5rem; }
.welcome-hints { display: flex; gap: 0.8rem; flex-wrap: wrap; justify-content: center; }
.hint-chip { padding: 0.5rem 1rem; background: #fff; border: 1px solid var(--border); border-radius: 20px; cursor: pointer; font-size: 0.85rem; color: #555; transition: all 0.2s; }
.hint-chip:hover { border-color: var(--primary); color: var(--primary); background: #fef2f2; }
</style>
</head>
<body>

<!-- 侧边栏 -->
<div class="sidebar">
    <div class="sidebar-header">
        <a href="index.html">&larr; 返回首页</a>
        <h2>教学对话助手</h2>
    </div>
    <button class="new-chat-btn" onclick="newChat()">+ 新对话</button>
    <div class="mode-select">
        <label>对话模式</label>
        <select id="modeSelect">
            <option value="auto">智能模式（自动判断）</option>
            <option value="local">本地知识库</option>
            <option value="online">联网搜索</option>
        </select>
    </div>
    <div class="session-list" id="sessionList"></div>
</div>

<!-- 主区域 -->
<div class="main">
    <div class="chat-header">
        <h3 id="chatTitle">新对话</h3>
        <span class="status-bar" id="statusBar"></span>
    </div>
    <div class="messages" id="messages">
        <div class="welcome" id="welcome">
            <h2>春秋战国历史问答</h2>
            <p>基于知识库与知识图谱的智能教学助手</p>
            <div class="welcome-hints">
                <div class="hint-chip" onclick="askHint(this)">商鞅变法的核心内容是什么？</div>
                <div class="hint-chip" onclick="askHint(this)">长平之战的经过</div>
                <div class="hint-chip" onclick="askHint(this)">孔子和老子是什么关系？</div>
                <div class="hint-chip" onclick="askHint(this)">春秋五霸分别是谁？</div>
                <div class="hint-chip" onclick="askHint(this)">百家争鸣有哪些主要流派？</div>
            </div>
        </div>
    </div>
    <div class="input-area">
        <div class="input-wrap">
            <textarea id="userInput" placeholder="输入你的问题... (Enter 发送, Shift+Enter 换行)" onkeydown="handleKey(event)"></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
        </div>
    </div>
</div>

<script>
const API_BASE = window.location.origin;
let currentSessionId = '';
let isStreaming = false;

// --- 会话管理 ---
async function loadSessions() {
    try {
        const res = await fetch(`${API_BASE}/api/dialog/sessions`);
        const data = await res.json();
        const list = document.getElementById('sessionList');
        list.innerHTML = '';
        (data.sessions || []).forEach(s => {
            const div = document.createElement('div');
            div.className = 'session-item' + (s.id === currentSessionId ? ' active' : '');
            div.textContent = s.title || '新对话';
            div.onclick = () => loadSession(s.id);
            list.appendChild(div);
        });
    } catch(e) { console.error('加载会话列表失败:', e); }
}

async function loadSession(sessionId) {
    currentSessionId = sessionId;
    try {
        const res = await fetch(`${API_BASE}/api/dialog/history?session_id=${sessionId}`);
        const data = await res.json();
        clearMessages();
        (data.messages || []).forEach(m => {
            if (m.role === 'user') appendMessage('user', m.content);
            else if (m.role === 'assistant' && m.content) appendMessage('bot', m.content);
        });
        loadSessions();
    } catch(e) { console.error('加载会话失败:', e); }
}

function newChat() {
    currentSessionId = '';
    clearMessages();
    document.getElementById('welcome').style.display = 'flex';
    document.getElementById('chatTitle').textContent = '新对话';
    loadSessions();
}

// --- 消息渲染 ---
function clearMessages() {
    const container = document.getElementById('messages');
    container.innerHTML = '<div class="welcome" id="welcome" style="display:none;"><h2>春秋战国历史问答</h2></div>';
}

function appendMessage(role, content) {
    document.getElementById('welcome').style.display = 'none';
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    const avatar = role === 'user' ? '👤' : '📜';
    div.innerHTML = `<div class="avatar">${avatar}</div><div class="bubble">${formatContent(content)}</div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
}

function createStreamingMessage() {
    document.getElementById('welcome').style.display = 'none';
    const container = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'message bot';
    div.id = 'streaming-msg';
    div.innerHTML = `<div class="avatar">📜</div><div class="bubble" id="streaming-bubble"></div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return document.getElementById('streaming-bubble');
}

function formatContent(text) {
    if (!text) return '';
    // 简单 markdown: **bold**, 换行, 代码块
    let html = text
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');
    return html;
}

// --- 发送消息 (SSE) ---
async function sendMessage() {
    const input = document.getElementById('userInput');
    const text = input.value.trim();
    if (!text || isStreaming) return;

    isStreaming = true;
    document.getElementById('sendBtn').disabled = true;
    input.value = '';
    input.style.height = '44px';

    appendMessage('user', text);

    const mode = document.getElementById('modeSelect').value;
    const bubble = createStreamingMessage();
    let fullText = '';

    try {
        const res = await fetch(`${API_BASE}/api/dialog/chat`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text, session_id: currentSessionId, mode })
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
            const { done, value } = await reader.read();
            if (done) break;
            const chunk = decoder.decode(value, { stream: true });
            const lines = chunk.split('\n').filter(l => l.startsWith('data: '));

            for (const line of lines) {
                try {
                    const evt = JSON.parse(line.slice(6));
                    switch(evt.type) {
                        case 'text':
                            fullText += evt.content;
                            bubble.innerHTML = formatContent(fullText);
                            document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
                            break;
                        case 'status':
                            document.getElementById('statusBar').textContent = evt.content;
                            break;
                        case 'tool_call':
                            bubble.innerHTML += `<div class="tool-card"><span class="tool-name">🔧 ${evt.tool}</span></div>`;
                            break;
                        case 'tool_result':
                            const cards = bubble.querySelectorAll('.tool-card');
                            if (cards.length > 0) {
                                const last = cards[cards.length - 1];
                                let preview = evt.result || '';
                                if (preview.length > 200) preview = preview.slice(0, 200) + '...';
                                last.innerHTML += `<div class="tool-result">${preview}</div>`;
                            }
                            break;
                        case 'done':
                            if (evt.session_id) {
                                currentSessionId = evt.session_id;
                                loadSessions();
                            }
                            break;
                        case 'error':
                            bubble.innerHTML += `<br><span style="color:red;">错误: ${evt.content}</span>`;
                            break;
                    }
                } catch(e) { /* 跳过解析失败的行 */ }
            }
        }
    } catch(e) {
        bubble.innerHTML += `<br><span style="color:red;">请求失败: ${e.message}</span>`;
    }

    document.getElementById('statusBar').textContent = '';
    document.getElementById('sendBtn').disabled = false;
    isStreaming = false;
    if (document.getElementById('streaming-msg')) {
        document.getElementById('streaming-msg').removeAttribute('id');
    }
}

// --- 辅助 ---
function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
    // 自动调整高度
    const ta = e.target;
    setTimeout(() => { ta.style.height = '44px'; ta.style.height = Math.min(ta.scrollHeight, 120) + 'px'; }, 0);
}

function askHint(el) {
    document.getElementById('userInput').value = el.textContent;
    sendMessage();
}

// 初始化
loadSessions();
</script>
</body>
</html>
