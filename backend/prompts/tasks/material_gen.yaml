name: material_gen
version: "1.0"
description: 生成教学材料的提示词模板（PPT、习题、史料等）
variables:
  - name: material_type
    type: string
    required: true
    description: 材料类型（ppt/exercise/historical_material/timeline）
  - name: topic
    type: string
    required: true
    description: 主题
  - name: content_points
    type: array
    required: true
    description: 内容要点
  - name: grade
    type: string
    required: true
    description: 年级

system: |
  {{import "system/historian.txt"}}

  你是一位专业的历史教学资源开发者，擅长制作各类高质量的教学辅助材料。

user: |
  请为以下主题生成{{.material_type}}类型的教学材料：

  ## 主题信息
  - **主题**：{{.topic}}
  - **年级**：{{.grade}}
  - **材料类型**：{{.material_type}}

  ## 内容要点
  {{range .content_points}}
  - {{.}}
  {{end}}

  ## 输出要求
  {{if eq .material_type "ppt"}}
  请设计PPT大纲，按以下JSON格式输出：
  ```json
  {
    "title": "PPT标题",
    "slides": [
      {
        "number": 1,
        "type": "title",
        "title": "标题",
        "subtitle": "副标题",
        "notes": "讲解要点"
      },
      {
        "number": 2,
        "type": "content",
        "title": "页面标题",
        "content": ["要点1", "要点2"],
        "visual": "建议配图/图表描述",
        "notes": "讲解话术"
      }
    ]
  }
  ```
  {{else if eq .material_type "exercise"}}
  请设计习题，按以下JSON格式输出：
  ```json
  {
    "title": "习题标题",
    "questions": [
      {
        "type": "choice",
        "difficulty": "easy/medium/hard",
        "question": "题目内容",
        "options": ["A. xxx", "B. xxx", "C. xxx", "D. xxx"],
        "answer": "A",
        "explanation": "解析"
      },
      {
        "type": "fill_blank",
        "difficulty": "medium",
        "question": "题目内容",
        "answer": "答案",
        "explanation": "解析"
      },
      {
        "type": "short_answer",
        "difficulty": "hard",
        "question": "题目内容",
        "model_answer": "参考答案要点",
        "grading_points": ["采分点1", "采分点2"]
      }
    ]
  }
  ```
  {{else if eq .material_type "historical_material"}}
  请设计史料阅读材料，按以下JSON格式输出：
  ```json
  {
    "title": "史料集标题",
    "materials": [
      {
        "id": "M1",
        "type": "text/image",
        "source": "史料出处",
        "era": "所属时代",
        "content": "史料原文",
        "translation": "现代汉语翻译（如需要）",
        "guiding_questions": ["引导问题1", "引导问题2"],
        "teaching_tips": "教学使用建议"
      }
    ]
  }
  ```
  {{else if eq .material_type "timeline"}}
  请设计时间轴，按以下JSON格式输出：
  ```json
  {
    "title": "时间轴标题",
    "era": "时代范围",
    "events": [
      {
        "date": "具体时间",
        "title": "事件标题",
        "description": "事件描述",
        "significance": "历史意义",
        "related_figures": ["相关人物"],
        "importance": 5
      }
    ]
  }
  ```
  {{end}}

  注意：
  1. 内容要准确、严谨，符合历史事实
  2. 难度要适合{{.grade}}学生
  3. 体现历史学科核心素养
